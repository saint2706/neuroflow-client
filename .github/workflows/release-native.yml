name: Native Multi-OS Release Builds

on:
  workflow_dispatch:
    inputs:
      run_optional_linux_windows_cross_build:
        description: "Run optional Linux -> Windows cross-build with Wine/NSIS"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  native-release-build:
    name: Native build & publish artifact (${{ matrix.platform_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform_name: linux
            electron_builder_target: --linux
            artifact_glob: |
              dist/*.AppImage
              dist/*.deb
              dist/*.zip
          - os: windows-latest
            platform_name: windows
            electron_builder_target: --win
            artifact_glob: |
              dist/*.exe
              dist/*.msi
              dist/*.zip
          - os: macos-latest
            platform_name: macos
            electron_builder_target: --mac
            artifact_glob: |
              dist/*.dmg
              dist/*.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & package for ${{ matrix.platform_name }} on native runner
        run: npm run electron:build -- ${{ matrix.electron_builder_target }}

      - name: Publish native artifact (${{ matrix.platform_name }})
        uses: actions/upload-artifact@v4
        with:
          name: neuroflow-${{ matrix.platform_name }}-artifacts
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  optional-linux-windows-cross-build:
    name: Optional cross-build (linux -> windows via Wine/NSIS)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_optional_linux_windows_cross_build }}
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux dependencies for Windows cross-build (Wine + NSIS)
        run: |
          sudo apt-get update
          sudo apt-get install -y wine64 nsis

      - name: Install dependencies
        run: npm ci

      - name: Build Windows artifact from Linux (optional/non-blocking)
        run: npm run electron:build -- --win

      - name: Publish optional Linux->Windows cross-build artifact
        uses: actions/upload-artifact@v4
        with:
          name: neuroflow-windows-cross-build-from-linux
          path: |
            dist/*.exe
            dist/*.msi
            dist/*.zip
          if-no-files-found: warn
